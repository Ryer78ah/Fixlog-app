name: Build FixLog APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install npm dependencies
        run: npm install

      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Add mic permissions to AndroidManifest.xml
        run: |
          FILE="android/app/src/main/AndroidManifest.xml"
          sed -i 's|<manifest xmlns:android="http://schemas.android.com/apk/res/android">|<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />|' "$FILE"
          grep "uses-permission" "$FILE"

      - name: Show MainActivity.java before copy
        run: |
          echo "=== File from repo ==="
          cat android_src/MainActivity.java
          echo "=== Hex dump first 100 bytes ==="
          xxd android_src/MainActivity.java | head -10
          DEST=$(find android -name "MainActivity.java" | head -1)
          echo "=== Original MainActivity ==="
          cat "$DEST"

      - name: Copy MainActivity.java from repo into Android project
        run: |
          DEST=$(find android -name "MainActivity.java" | head -1)
          echo "Destination: $DEST"
          cp android_src/MainActivity.java "$DEST"
          echo "=== Copied file ==="
          cat "$DEST"

      - name: Show all Java files in project
        run: |
          find android -name "*.java" | head -20
          echo "=== build.gradle app ==="
          cat android/app/build.gradle

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK with full logging
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --info 2>&1 | tail -100
        continue-on-error: true

      - name: Show compiler errors
        run: |
          find android -name "*.log" 2>/dev/null | xargs grep -l "error:" 2>/dev/null | head -5 | xargs cat 2>/dev/null || echo "No log files found"
          find android/app/build -name "*.log" 2>/dev/null | head -10

      - name: Verify APK exists
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK" ]; then
            echo "SUCCESS"
            ls -lh "$APK"
          else
            echo "APK not found - build failed"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FixLog-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
