name: Build FixLog APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web files to Android
        run: npx cap sync android

      - name: Add RECORD_AUDIO permission to AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|<manifest xmlns:android="http://schemas.android.com/apk/res/android">|<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />|' "$MANIFEST"
          echo "AndroidManifest updated:"
          grep -A3 "uses-permission" "$MANIFEST"

      - name: Register SpeechRecognition plugin in MainActivity
        run: |
          MAIN="android/app/src/main/java/com/nawaz/fixlog/MainActivity.java"
          cat > "$MAIN" << 'JAVA'
          package com.nawaz.fixlog;

          import android.os.Bundle;
          import com.getcapacitor.BridgeActivity;
          import com.capacitorjs.plugins.speechrecognition.SpeechRecognitionPlugin;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  registerPlugin(SpeechRecognitionPlugin.class);
                  super.onCreate(savedInstanceState);
              }
          }
          JAVA
          echo "MainActivity updated"
          cat "$MAIN"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: FixLog-debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show APK info
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK" ]; then
            echo "✅ APK built successfully!"
            echo "Size: $(du -h $APK | cut -f1)"
          else
            echo "❌ APK not found"
            exit 1
          fi
