name: Build FixLog APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install npm dependencies
        run: npm install

      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Add mic permissions to AndroidManifest.xml
        run: |
          FILE="android/app/src/main/AndroidManifest.xml"
          sed -i 's|<manifest xmlns:android="http://schemas.android.com/apk/res/android">|<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />|' "$FILE"
          grep "uses-permission" "$FILE"

      - name: Find correct SpeechRecognition class name
        run: |
          echo "=== Searching for SpeechRecognition classes in node_modules ==="
          find node_modules/@capacitor-community/speech-recognition -name "*.java" 2>/dev/null
          find node_modules/@capacitor-community/speech-recognition/android -name "*.java" 2>/dev/null | head -20
          echo "=== Package declarations ==="
          find node_modules/@capacitor-community/speech-recognition -name "*.java" -exec grep -l "class.*Plugin" {} \; 2>/dev/null
          find node_modules/@capacitor-community/speech-recognition -name "*.java" -exec grep "^package\|class.*Plugin" {} \; 2>/dev/null

      - name: Write correct MainActivity.java
        run: |
          DEST=$(find android -name "MainActivity.java" | head -1)
          echo "Writing to: $DEST"
          # Find the actual plugin class name from installed package
          PLUGIN_FILE=$(find node_modules/@capacitor-community/speech-recognition -name "SpeechRecognition.java" -o -name "SpeechRecognitionPlugin.java" 2>/dev/null | head -1)
          echo "Found plugin file: $PLUGIN_FILE"
          if [ -n "$PLUGIN_FILE" ]; then
            PACKAGE=$(grep "^package" "$PLUGIN_FILE" | sed 's/package //;s/;//')
            CLASS=$(grep "public class" "$PLUGIN_FILE" | awk '{print $3}')
            echo "Package: $PACKAGE"
            echo "Class: $CLASS"
            cat > "$DEST" << EOF
package com.nawaz.fixlog;

import android.os.Bundle;
import com.getcapacitor.BridgeActivity;
import ${PACKAGE}.${CLASS};

public class MainActivity extends BridgeActivity {
    @Override
    public void onCreate(Bundle savedInstanceState) {
        registerPlugin(${CLASS}.class);
        super.onCreate(savedInstanceState);
    }
}
EOF
          else
            echo "Plugin Java file not found, using default MainActivity"
            cat > "$DEST" << EOF
package com.nawaz.fixlog;

import android.os.Bundle;
import com.getcapacitor.BridgeActivity;

public class MainActivity extends BridgeActivity {
    @Override
    public void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
    }
}
EOF
          fi
          echo "=== Final MainActivity.java ==="
          cat "$DEST"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon 2>&1

      - name: Verify APK exists
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK" ]; then
            echo "SUCCESS"
            ls -lh "$APK"
          else
            echo "APK not found"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FixLog-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
